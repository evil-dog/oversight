name: Monthly Dependency Update

on:
  schedule:
    - cron: '0 9 1 * *'  # 1st of each month, 09:00 UTC
  workflow_dispatch:       # Allow manual trigger for testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Check for dependency updates
        run: ./gradlew dependencyUpdates -DoutputFormatter=json

      - name: Apply updates
        id: updates
        run: python3 scripts/update_deps.py

      - name: Create branch and push
        id: branch
        if: steps.updates.outputs.updated == 'true'
        run: |
          BRANCH="deps/$(date +%Y-%m)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add app/build.gradle.kts build.gradle.kts gradle/wrapper/gradle-wrapper.properties
          git commit -m "chore: update dependencies $(date +%Y-%m)"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "url=https://github.com/${{ github.repository }}/tree/$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Build debug APK to verify
        id: build
        if: steps.updates.outputs.updated == 'true'
        run: ./gradlew assembleDebug
        continue-on-error: true

      - name: Compose email
        id: email
        env:
          UPDATED: ${{ steps.updates.outputs.updated }}
          SUMMARY: ${{ steps.updates.outputs.summary }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          BRANCH_URL: ${{ steps.branch.outputs.url }}
        run: |
          MONTH=$(date +%Y-%m)
          if [[ "$UPDATED" == "true" ]]; then
            [[ "$BUILD_OUTCOME" == "success" ]] && BUILD_STATUS="SUCCESS ✓" || BUILD_STATUS="FAILED ✗"
            SUBJECT="OverSight dependency updates — ${MONTH} — Build: ${BUILD_STATUS}"
            printf 'Monthly dependency check — %s\n\n%s\n\nBuild: %s\n\nBranch: %s\n%s\n\nTo create a release from this branch:\n  git fetch origin %s\n  git checkout %s\n  git tag vX.Y.Z && git push origin vX.Y.Z\n' \
              "$MONTH" "$SUMMARY" "$BUILD_STATUS" "$BRANCH" "$BRANCH_URL" "$BRANCH" "$BRANCH" \
              > /tmp/email_body.txt
          else
            SUBJECT="OverSight dependencies — all up to date — ${MONTH}"
            printf 'Monthly dependency check — %s\n\nAll dependencies are current. No updates available.\n' \
              "$MONTH" > /tmp/email_body.txt
          fi
          echo "subject=${SUBJECT}" >> "$GITHUB_OUTPUT"

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ steps.email.outputs.subject }}
          to: ${{ secrets.MAIL_TO }}
          from: OverSight CI <${{ secrets.MAIL_USERNAME }}>
          body_filepath: /tmp/email_body.txt
